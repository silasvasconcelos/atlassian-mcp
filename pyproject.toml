[project]
name = "jira-mcp"
version = "0.1.0"
description = "MCP server for Jira REST API v3 (auto-generated from OpenAPI)"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Codex" }]
license = { text = "Apache-2.0" }

dependencies = [
  "mcp>=1.2.0",
  "httpx>=0.27.0",
  "pydantic>=2.6.0",
  "python-dotenv>=1.0.1",
  "uvicorn>=0.30.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2.0",
  "respx>=0.21.0",
  "pytest-asyncio>=0.23.0",
]

[project.scripts]
jira-mcp = "jira_mcp.server:main"

[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
  "integration: integration tests that hit real Jira",
]
